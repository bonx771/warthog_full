ekf_global:

  frequency: 30
  two_d_mode: true

  publish_tf: true
  publish_acceleration: false

  map_frame: map
  odom_frame: odom
  base_link_frame: base_link
  world_frame: map

  # ===== Local EKF output =====
  odom0: /odometry/local
  odom0_config: [true,  true,  false,
                 false, false, true,
                 true,  true,  false,
                 false, false, true,
                 false, false, false]
  odom0_differential: false

  # ===== GPS =====
  odom1: /odometry/gps
  odom1_config: [true,  true,  false,
                 false, false, false,
                 false, false, false,
                 false, false, false,
                 false, false, false]
  odom1_differential: false